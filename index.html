
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CTE Learning Format Advisor</title>

  <!-- React -->
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>

  <!-- Babel (to run JSX in browser) -->
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

function LearningFormatAdvisor() {
  const [topic, setTopic] = React.useState("");
  const [need, setNeed] = React.useState("understand");
  const [complexity, setComplexity] = React.useState("complex");
  const [timing, setTiming] = React.useState("before");

function getRecommendation() {
  if (need === "understand") {
    if (timing === "during") return "Performance support (job aid or quick reference)";
    if (complexity === "complex") return "Structured learning (Rise + Storyline scenario)";
    return "Structured learning (Rise course)";
  }

  if (need === "perform") {
    if (timing === "before" && complexity === "complex")
      return "Blended: short course + job aid + video";
    return "Job aid + short video";
  }

  if (need === "decide") {
    if (complexity === "complex")
      return "Scenario-based learning (Storyline with branching)";
    return "Light scenario or case-based learning";
  }

  if (need === "execute") {
    if (timing === "after")
      return "⚠ Risk: execution skills need practice before or during work";
    return "Simulation + validation + job aid";
  }
}

  function getAssetCount() {
  if (need === "understand") {
    return complexity === "complex"
      ? "Core: 1 | Support: 2 | Assessment: 1 | Reinforcement: 1 (Total: 5)"
      : "Core: 1 | Support: 1 | Assessment: 1 (Total: 3)";
  }

  if (need === "perform") {
    return "Core: 1 | Support: 1 | Assessment: 1 (Total: 3)";
  }

  if (need === "decide") {
    return "Core: 1 | Support: 1 | Assessment: 1 | Reinforcement: 1 (Total: 4)";
  }

  if (need === "execute") {
    return "Core: 1 | Validation: 1 | Support: 1 (Total: 3)";
  }
}

  function copyExecutive() {
    navigator.clipboard.writeText(
      `Topic: ${topic}\nFormat: ${getRecommendation()}\nAssets: ${getAssetCount()}`
    );
    alert("Executive brief ready to share");
  }

function copyDesignBrief() {
  const packageText = getRecommendedPackage()
    .map(item => `${item.role}: ${item.asset} [${item.status}]
${item.definition}`)
    .join("\n\n");

  navigator.clipboard.writeText(
    `CTE DESIGN BRIEF

Topic: ${topic}

Learning Need: ${need}
Timing: ${timing}
Complexity: ${complexity}

Recommended Format:
${getRecommendation()}

Instructional Pattern:
${getInstructionalPattern()}

Asset Estimate:
${getAssetCount()}

Recommended Package:
${packageText}`
  );

  alert("Design brief ready to paste");
}

function getConfidence() {
  if (need === "execute" && timing === "after") return "❌ Misaligned";
  if (need === "understand" && timing === "during") return "⚠ Needs adjustment";
  return "✅ Best fit";
}

function getNeedDefinition() {
  if (need === "understand") {
    return "Learners need to build conceptual understanding — definitions, frameworks, and how things work.";
  }

  if (need === "perform") {
    return "Learners need to complete a task or workflow correctly and efficiently.";
  }

  if (need === "decide") {
    return "Learners need to evaluate options and apply judgment in real scenarios.";
  }

  if (need === "execute") {
    return "Learners must perform a structured process accurately with little room for error.";
  }
  return "";
}

  function getInstructionalPattern() {
  if (need === "execute" && complexity === "complex") {
    return "Show It → Teach It → Try It (video demonstration → guided simulation → independent practice)";
  }

  if (need === "execute") {
    return "Guided practice with validation (Teach It → Try It)";
  }

  return "";
}

{getRecommendedPackage() && (
  <div style={{marginTop:15}}>
    <strong>Recommended Package:</strong>

    <div style={{fontSize:13, marginTop:6}}>
      <div><b>Core:</b> {getRecommendedPackage().core}</div>
      <div><b>Support:</b> {getRecommendedPackage().support}</div>
      <div><b>Validation:</b> {getRecommendedPackage().validation}</div>
      <div><b>Reinforcement:</b> {getRecommendedPackage().reinforcement}</div>
    </div>
  </div>
)}


  
function getRecommendationDefinition() {
  const rec = getRecommendation();

  if (!rec) return "";

  if (rec.toLowerCase().includes("structured learning")) {
    return "A structured learning experience that builds knowledge and skills in a logical sequence, often including instruction, practice, and assessment.";
  }

  if (rec.toLowerCase().includes("simulation")) {
    return "An interactive environment that replicates real-world tasks, allowing learners to practice and apply skills in a safe, risk-free setting.";
  }

  if (rec.toLowerCase().includes("job aid")) {
    return "A practical tool that provides step-by-step guidance or reference information to support task execution at the moment of need.";
  }

  if (rec.toLowerCase().includes("scenario")) {
    return "A case-based learning experience that allows learners to practice decision-making in realistic situations.";
  }

  if (rec.toLowerCase().includes("video") || rec.toLowerCase().includes("demonstration")) {
    return "A visual walkthrough that shows how a process works or how a task is performed before learners attempt it themselves.";
  }

  return "";
}

function getRecommendedPackage() {
  if (need === "execute" && complexity === "complex") {
    return {
      core: "Simulation (guided + independent practice)",
      support: "Video demonstration (Show It)",
      validation: "Independent scenario (Try It)",
      reinforcement: "Job aids / in-tool support"
    };
  }

  if (need === "execute") {
    return {
      core: "Guided practice",
      support: "Quick reference",
      validation: "Short validation activity",
      reinforcement: "Job aid"
    };
  }

  if (need === "understand") {
    return {
      core: "Structured course",
      support: "Visual explanations",
      validation: "Knowledge check",
      reinforcement: "Summary materials"
    };
  }

  if (need === "perform") {
    return {
      core: "Job aid",
      support: "Short video",
      validation: "Task-based check",
      reinforcement: "Quick access resources"
    };
  }

  if (need === "decide") {
    return {
      core: "Scenario-based learning",
      support: "Case examples",
      validation: "Decision exercise",
      reinforcement: "Guidelines / frameworks"
    };
  }

  return null;
}

function getRecommendedPackage() {
  if (need === "execute" && complexity === "complex") {
    return [
      {
        role: "Core",
        asset: "Simulation",
        status: "Required",
        definition: "The primary asset that enables the learner to practice and build the target capability. For complex execution tasks, this should include guided practice and independent practice."
      },
      {
        role: "Support",
        asset: "Video demonstration",
        status: "Required",
        definition: "A supporting asset that helps learners understand what they are about to do before they attempt it. This is the Show It layer."
      },
      {
        role: "Assessment",
        asset: "Independent scenario",
        status: "Required",
        definition: "An asset used to confirm the learner can perform the task independently, without step-by-step guidance. This is the Try It validation layer."
      },
      {
        role: "Performance Support",
        asset: "Job aid / in-tool support",
        status: "Recommended",
        definition: "A just-in-time support asset that helps users complete the task accurately while working in the real system."
      },
      {
        role: "Reinforcement",
        asset: "Refresher or quick reference",
        status: "Optional",
        definition: "A follow-up asset that helps sustain retention and supports repeated application over time."
      }
    ];
  }

  if (need === "execute") {
    return [
      {
        role: "Core",
        asset: "Guided practice",
        status: "Required",
        definition: "The primary asset that helps the learner perform the task with support before attempting it independently."
      },
      {
        role: "Assessment",
        asset: "Short validation activity",
        status: "Required",
        definition: "An activity that confirms the learner can complete the task correctly."
      },
      {
        role: "Performance Support",
        asset: "Job aid",
        status: "Recommended",
        definition: "A support asset that helps the learner complete the task accurately during real work."
      },
      {
        role: "Reinforcement",
        asset: "Quick reference",
        status: "Optional",
        definition: "A lightweight asset used to refresh memory after the initial learning experience."
      }
    ];
  }

  if (need === "understand") {
    return [
      {
        role: "Core",
        asset: "Structured course",
        status: "Required",
        definition: "The primary asset that builds conceptual understanding through a sequenced learning experience."
      },
      {
        role: "Support",
        asset: "Visual explanation or example",
        status: "Recommended",
        definition: "A supporting asset that helps make concepts easier to understand through examples, visuals, or demonstrations."
      },
      {
        role: "Assessment",
        asset: "Knowledge check",
        status: "Required",
        definition: "An asset that confirms the learner understands the key concepts."
      },
      {
        role: "Reinforcement",
        asset: "Summary material",
        status: "Optional",
        definition: "A follow-up asset that helps learners remember and revisit the core concept after the course."
      }
    ];
  }

  if (need === "perform") {
    return [
      {
        role: "Core",
        asset: "Job aid",
        status: "Required",
        definition: "The primary asset that enables the learner to complete a task efficiently at the point of need."
      },
      {
        role: "Support",
        asset: "Short video",
        status: "Recommended",
        definition: "A supporting asset that demonstrates the task or shows what successful completion looks like."
      },
      {
        role: "Assessment",
        asset: "Task-based check",
        status: "Recommended",
        definition: "An activity that confirms the learner can complete the task correctly."
      },
      {
        role: "Reinforcement",
        asset: "Quick access resource",
        status: "Optional",
        definition: "A lightweight resource that helps the learner repeat or refresh the task later."
      }
    ];
  }

  if (need === "decide") {
    return [
      {
        role: "Core",
        asset: "Scenario-based learning",
        status: "Required",
        definition: "The primary asset that helps learners practice judgment by evaluating realistic situations and making decisions."
      },
      {
        role: "Support",
        asset: "Case examples",
        status: "Recommended",
        definition: "Supporting examples that help learners recognize patterns, trade-offs, and decision factors."
      },
      {
        role: "Assessment",
        asset: "Decision exercise",
        status: "Required",
        definition: "An activity that confirms the learner can apply judgment in a realistic situation."
      },
      {
        role: "Reinforcement",
        asset: "Guidelines / framework",
        status: "Recommended",
        definition: "A reference asset that helps learners apply the decision logic later in real work."
      }
    ];
  }

  return [];
}
  
function getStatusStyle(status) {
  if (status === "Required") {
    return {
      background: "#e6f4ea",
      color: "#137333",
      padding: "2px 6px",
      borderRadius: 6,
      fontSize: 11,
      fontWeight: "bold",
      marginLeft: 8
    };
  }

  if (status === "Recommended") {
    return {
      background: "#fff4e5",
      color: "#b06000",
      padding: "2px 6px",
      borderRadius: 6,
      fontSize: 11,
      fontWeight: "bold",
      marginLeft: 8
    };
  }

  return {
    background: "#eef2f7",
    color: "#475569",
    padding: "2px 6px",
    borderRadius: 6,
    fontSize: 11,
    fontWeight: "bold",
    marginLeft: 8
  };
}


function getComplexityDefinition() {
  if (complexity === "simple") {
    return "Low difficulty. Tasks are straightforward and repeatable (e.g., locating a report, following a fixed process).";
  }

  if (complexity === "moderate") {
    return "Moderate difficulty. Tasks involve multiple steps or light decision-making (e.g., configuring a dashboard, running a standard analysis).";
  }

  if (complexity === "complex") {
    return "High difficulty. Tasks require precision, judgment, or multi-step execution (e.g., setting up a Test & Learn experiment, interpreting results, making recommendations).";
  }

  return "";
}

  
  return (
    <div>
      <h1>CTE Learning Format Advisor</h1>

<div className="card">
  <div>Topic</div>
  <input 
    value={topic} 
    onChange={e => setTopic(e.target.value)} 
    placeholder="Enter learning topic"
  />

  <div style={{marginTop:10}}>Learning Need</div>
  <select value={need} onChange={e => setNeed(e.target.value)}>
    <option value="understand">Understand</option>
    <option value="perform">Perform</option>
    <option value="decide">Decide</option>
    <option value="execute">Execute</option>
  </select>

  <div style={{marginTop:6, fontSize:12, color:"#555"}}>
    {getNeedDefinition()}
  </div>      
        <div style={{marginTop:10}}>Timing</div>
        <select value={timing} onChange={e => setTiming(e.target.value)}>
          <option value="before">Before Work</option>
          <option value="during">During Work</option>
          <option value="after">After Learning</option>
        </select>

        <div style={{marginTop:10}}>Complexity</div>
        <select value={complexity} onChange={e => setComplexity(e.target.value)}>
          <option value="simple">Simple</option>
          <option value="moderate">Moderate</option>
          <option value="complex">Complex</option>
        </select>
<div style={{marginTop:6, fontSize:12, color:"#555"}}>
  {getComplexityDefinition()}
</div>

  
</div>


      
<div className="card">
<h3>Recommendation</h3>
<div>{getRecommendation()}</div>

{getRecommendationDefinition() && (
  <div style={{marginTop:6, fontSize:12, color:"#555"}}>
    {getRecommendationDefinition()}
  </div>
)}

<div style={{marginTop:10, fontSize:13, color:"#444"}}>
  <strong>Instructional Pattern:</strong><br/>
  {getInstructionalPattern()}
</div>


<div style={{marginTop:15}}>
  <strong>Recommended Package:</strong>

  <div style={{marginTop:8}}>
    {getRecommendedPackage().map((item, index) => (
      <div 
        key={index} 
        style={{
          marginTop:10,
          padding:10,
          border:"1px solid #ddd",
          borderRadius:8,
          background:"#fafafa"
        }}
      >
        <div>
          <strong>{item.role}:</strong> {item.asset}
          <span style={getStatusStyle(item.status)}>
            {item.status}
          </span>
        </div>

        <div style={{marginTop:5, fontSize:12, color:"#555"}}>
          {item.definition}
        </div>
      </div>
    ))}
  </div>
</div>




  
  <div style={{marginTop:10, fontWeight:"bold"}}>
    {getConfidence()}
  </div>

  <h3 style={{marginTop:20}}>Asset Count</h3>
  <div>{getAssetCount()}</div>

  <div>
    <button onClick={copyExecutive}>
      For leadership
    </button>

    <button onClick={copyDesignBrief} style={{marginLeft:10}}>
      For design team
    </button>
  </div>
</div>

</div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LearningFormatAdvisor />);

</script>
</body>
</html>
