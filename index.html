
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CTE Learning Format Advisor</title>

  <!-- React -->
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>

  <!-- Babel (to run JSX in browser) -->
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

function LearningFormatAdvisor() {
  const [topic, setTopic] = React.useState("");
  const [need, setNeed] = React.useState("understand");
  const [complexity, setComplexity] = React.useState("complex");
  const [timing, setTiming] = React.useState("before");
  const [topicType, setTopicType] = React.useState("concept");
  
function getRecommendation() {
  if (need === "understand") {
    if (timing === "during") return "Performance support (job aid or quick reference)";
    if (complexity === "complex") return "Structured learning (Rise + Storyline scenario)";
    return "Structured learning (Rise course)";
  }

  if (need === "perform") {
    if (timing === "before" && complexity === "complex")
      return "Blended: short course + job aid + video";
    return "Job aid + short video";
  }

  if (need === "decide") {
    if (complexity === "complex")
      return "Scenario-based learning (Storyline with branching)";
    return "Light scenario or case-based learning";
  }

  if (need === "execute") {
    if (timing === "after")
      return "⚠ Risk: execution skills need practice before or during work";
    return "Simulation + validation + job aid";
  }
}

  function getAssetCount() {
  if (need === "understand") {
    return complexity === "complex"
      ? "Core: 1 | Support: 2 | Assessment: 1 | Reinforcement: 1 (Total: 5)"
      : "Core: 1 | Support: 1 | Assessment: 1 (Total: 3)";
  }

  if (need === "perform") {
    return "Core: 1 | Support: 1 | Assessment: 1 (Total: 3)";
  }

  if (need === "decide") {
    return "Core: 1 | Support: 1 | Assessment: 1 | Reinforcement: 1 (Total: 4)";
  }

  if (need === "execute") {
    return "Core: 1 | Validation: 1 | Support: 1 (Total: 3)";
  }
}

  function copyExecutive() {
    navigator.clipboard.writeText(
      `Topic: ${topic}\nFormat: ${getRecommendation()}\nAssets: ${getAssetCount()}`
    );
    alert("Executive brief ready to share");
  }

function copyDesignBrief() {
  const delivery = getRecommendedDeliveryApproach();

  const packageText = getRecommendedPackage()
    .map(item => `${item.role}: ${item.asset} [${item.status}]
${item.definition}`)
    .join("\n\n");

  navigator.clipboard.writeText(
    `CTE DESIGN BRIEF

Topic: ${topic}

Topic Type: ${topicType}
Learning Need: ${need}
Timing: ${timing}
Complexity: ${complexity}

Recommended Format:
${getRecommendation()}

Recommended Delivery Approach:
${delivery.approach}
${delivery.description}

Instructional Pattern:
${getInstructionalPattern()}

Asset Estimate:
${getAssetCount()}

Recommended Package:
${packageText}`
  );

  alert("Design brief ready to paste");
}
function getConfidence() {
  if (need === "execute" && timing === "after") return "❌ Misaligned";
  if (need === "understand" && timing === "during") return "⚠ Needs adjustment";
  return "✅ Best fit";
}

function getNeedDefinition() {
  if (need === "understand") {
    return "Learners need to build conceptual understanding — definitions, frameworks, and how things work.";
  }

  if (need === "perform") {
    return "Learners need to complete a task or workflow correctly and efficiently.";
  }

  if (need === "decide") {
    return "Learners need to evaluate options and apply judgment in real scenarios.";
  }

  if (need === "execute") {
    return "Learners must perform a structured process accurately with little room for error.";
  }
  return "";
}

  function getInstructionalPattern() {
  if (need === "execute" && complexity === "complex") {
    return "Show It → Teach It → Try It (video demonstration → guided simulation → independent practice)";
  }

  if (need === "execute") {
    return "Guided practice with validation (Teach It → Try It)";
  }

  return "";
}



  
function getRecommendationDefinition() {
  const rec = getRecommendation();

  if (!rec) return "";

  if (rec.toLowerCase().includes("structured learning")) {
    return "A structured learning experience that builds knowledge and skills in a logical sequence, often including instruction, practice, and assessment.";
  }

  if (rec.toLowerCase().includes("simulation")) {
    return "An interactive environment that replicates real-world tasks, allowing learners to practice and apply skills in a safe, risk-free setting.";
  }

  if (rec.toLowerCase().includes("job aid")) {
    return "A practical tool that provides step-by-step guidance or reference information to support task execution at the moment of need.";
  }

  if (rec.toLowerCase().includes("scenario")) {
    return "A case-based learning experience that allows learners to practice decision-making in realistic situations.";
  }

  if (rec.toLowerCase().includes("video") || rec.toLowerCase().includes("demonstration")) {
    return "A visual walkthrough that shows how a process works or how a task is performed before learners attempt it themselves.";
  }

  return "";
}



function getRecommendedPackage() {
  if (need === "execute" && complexity === "complex") {
    return [
      {
        role: "Core",
        asset: "Simulation",
        status: "Required",
        definition: "The primary asset that enables the learner to practice and build the target capability. For complex execution tasks, this should include guided practice and independent practice."
      },
      {
        role: "Support",
        asset: "Video demonstration",
        status: "Required",
        definition: "A supporting asset that helps learners understand what they are about to do before they attempt it. This is the Show It layer."
      },
      {
        role: "Assessment",
        asset: "Independent scenario",
        status: "Required",
        definition: "An asset used to confirm the learner can perform the task independently, without step-by-step guidance. This is the Try It validation layer."
      },
      {
        role: "Performance Support",
        asset: "Job aid / in-tool support",
        status: "Recommended",
        definition: "A just-in-time support asset that helps users complete the task accurately while working in the real system."
      },
      {
        role: "Reinforcement",
        asset: "Refresher or quick reference",
        status: "Optional",
        definition: "A follow-up asset that helps sustain retention and supports repeated application over time."
      }
    ];
  }

  if (need === "execute") {
    return [
      {
        role: "Core",
        asset: "Guided practice",
        status: "Required",
        definition: "The primary asset that helps the learner perform the task with support before attempting it independently."
      },
      {
        role: "Assessment",
        asset: "Short validation activity",
        status: "Required",
        definition: "An activity that confirms the learner can complete the task correctly."
      },
      {
        role: "Performance Support",
        asset: "Job aid",
        status: "Recommended",
        definition: "A support asset that helps the learner complete the task accurately during real work."
      },
      {
        role: "Reinforcement",
        asset: "Quick reference",
        status: "Optional",
        definition: "A lightweight asset used to refresh memory after the initial learning experience."
      }
    ];
  }

  if (need === "understand") {
    return [
      {
        role: "Core",
        asset: "Structured course",
        status: "Required",
        definition: "The primary asset that builds conceptual understanding through a sequenced learning experience."
      },
      {
        role: "Support",
        asset: "Visual explanation or example",
        status: "Recommended",
        definition: "A supporting asset that helps make concepts easier to understand through examples, visuals, or demonstrations."
      },
      {
        role: "Assessment",
        asset: "Knowledge check",
        status: "Required",
        definition: "An asset that confirms the learner understands the key concepts."
      },
      {
        role: "Reinforcement",
        asset: "Summary material",
        status: "Optional",
        definition: "A follow-up asset that helps learners remember and revisit the core concept after the course."
      }
    ];
  }

  if (need === "perform") {
    return [
      {
        role: "Core",
        asset: "Job aid",
        status: "Required",
        definition: "The primary asset that enables the learner to complete a task efficiently at the point of need."
      },
      {
        role: "Support",
        asset: "Short video",
        status: "Recommended",
        definition: "A supporting asset that demonstrates the task or shows what successful completion looks like."
      },
      {
        role: "Assessment",
        asset: "Task-based check",
        status: "Recommended",
        definition: "An activity that confirms the learner can complete the task correctly."
      },
      {
        role: "Reinforcement",
        asset: "Quick access resource",
        status: "Optional",
        definition: "A lightweight resource that helps the learner repeat or refresh the task later."
      }
    ];
  }

  if (need === "decide") {
    return [
      {
        role: "Core",
        asset: "Scenario-based learning",
        status: "Required",
        definition: "The primary asset that helps learners practice judgment by evaluating realistic situations and making decisions."
      },
      {
        role: "Support",
        asset: "Case examples",
        status: "Recommended",
        definition: "Supporting examples that help learners recognize patterns, trade-offs, and decision factors."
      },
      {
        role: "Assessment",
        asset: "Decision exercise",
        status: "Required",
        definition: "An activity that confirms the learner can apply judgment in a realistic situation."
      },
      {
        role: "Reinforcement",
        asset: "Guidelines / framework",
        status: "Recommended",
        definition: "A reference asset that helps learners apply the decision logic later in real work."
      }
    ];
  }

  return [];
}
  
function getStatusStyle(status) {
  if (status === "Required") {
    return {
      background: "#e6f4ea",
      color: "#137333",
      padding: "2px 6px",
      borderRadius: 6,
      fontSize: 11,
      fontWeight: "bold",
      marginLeft: 8
    };
  }

  if (status === "Recommended") {
    return {
      background: "#fff4e5",
      color: "#b06000",
      padding: "2px 6px",
      borderRadius: 6,
      fontSize: 11,
      fontWeight: "bold",
      marginLeft: 8
    };
  }

  return {
    background: "#eef2f7",
    color: "#475569",
    padding: "2px 6px",
    borderRadius: 6,
    fontSize: 11,
    fontWeight: "bold",
    marginLeft: 8
  };
}


function getComplexityDefinition() {
  if (complexity === "simple") {
    return "Low difficulty. Tasks are straightforward and repeatable (e.g., locating a report, following a fixed process).";
  }

  if (complexity === "moderate") {
    return "Moderate difficulty. Tasks involve multiple steps or light decision-making (e.g., configuring a dashboard, running a standard analysis).";
  }

  if (complexity === "complex") {
    return "High difficulty. Tasks require precision, judgment, or multi-step execution (e.g., setting up a Test & Learn experiment, interpreting results, making recommendations).";
  }

  return "";
}

function getComplexityHint() {
  return "Tip: Simple = one concept | Moderate = multiple concepts or steps | Complex = requires application, judgment, or precision where errors matter";
}

function getLearningNeedHint() {
  return "Tip: Learn about a concept → Understand | Do a task → Perform | Make a judgment → Decide | Execute a process with precision → Execute";
}  


function getTimingDefinition() {
  if (timing === "before") {
    return "Learning happens before work. Focus is on building knowledge or capability so the learner is prepared to perform.";
  }

  if (timing === "during") {
    return "Support happens during work. Focus is on enabling fast, accurate execution with minimal disruption.";
  }

  if (timing === "after") {
    return "Learning or reinforcement happens after work. Focus is on validating, improving, or reinforcing performance over time.";
  }

  return "";
}
function getTimingHint() {
  return "Tip: Build capability before work, support execution during work, and reinforce or validate after work.";
}

function getWorkDefinition() {
  return "Work refers to performing real tasks or activities in a live business context (e.g., using a system, analyzing data, making decisions).";
}

function getTopicTypeDefinition() {
  if (topicType === "concept") {
    return "Concept topics explain ideas, trends, frameworks, products, or market context. Examples: stablecoin, AI, payments of the future.";
  }

  if (topicType === "system") {
    return "System topics teach users how to complete tasks or workflows inside software or tools. Examples: setting up a Test & Learn analysis or using a reporting dashboard.";
  }

  if (topicType === "decision") {
    return "Decision topics help learners evaluate options, apply judgment, or make recommendations. Examples: choosing a control strategy, interpreting outputs, or advising a client.";
  }

  return "";
}  

function getTopicTypeHint() {
  return "Tip: Concept = explain an idea | System = use a tool or workflow | Decision = evaluate options or make a recommendation";
}

function getDeliveryApproach() {
  const rec = getRecommendation();

  if (rec.includes("Structured learning")) {
    return [
      "Traditional interactive course (Rise + Storyline)",
      "Video-led course (b-roll + voiceover)",
      "AI avatar-led course (Synthesia-style)",
      "Microlearning series (short modules)"
    ];
  }

  if (rec.includes("Simulation")) {
    return [
      "Guided simulation with feedback",
      "Scenario-based branching",
      "Immersive or role-play simulation"
    ];
  }

  if (rec.includes("Job aid")) {
    return [
      "Checklist or quick reference",
      "Interactive guide / deep links",
      "Embedded in-tool support"
    ];
  }

  return [];
}

  
function getRecommendedDeliveryApproach() {
  if (topicType === "concept") {
    if (need === "understand") {
      if (complexity === "simple") {
        return {
          approach: "Short explainer course",
          description: "A concise, visually clear course that introduces the concept, key terminology, and why it matters.",
          bestFor: "Simple concept introductions or awareness-building topics.",
          example: "A short module explaining what stablecoins are."
        };
      }

      if (complexity === "moderate") {
        return {
          approach: "Video-led structured course",
          description: "A structured learning experience supported by b-roll, voiceover, examples, and light interaction to help learners connect ideas.",
          bestFor: "Industry trends, product concepts, market context, and emerging topics with multiple connected ideas.",
          example: "A course on AI in payments or payments of the future."
        };
      }

      return {
        approach: "Interactive thought-leadership course",
        description: "A richer structured course that combines explanation, examples, reflection prompts, scenario questions, and applied interpretation.",
        bestFor: "Complex concept topics where learners must interpret implications, compare models, or apply a framework.",
        example: "A course on how stablecoins may affect cross-border payments strategy."
      };
    }

    if (need === "decide") {
      return {
        approach: "Scenario-led concept application",
        description: "A scenario-based experience where learners apply concepts to realistic business situations and evaluate trade-offs.",
        bestFor: "Concepts that require interpretation or recommendation-making.",
        example: "Evaluating which payment innovation matters most for a client segment."
      };
    }
  }

  if (topicType === "system") {
    if (need === "execute") {
      if (complexity === "complex") {
        return {
          approach: "Show It / Teach It / Try It software course",
          description: "A course that starts with a video demonstration, moves into guided simulation, and ends with independent practice.",
          bestFor: "Complex workflows where accuracy, sequence, and practice matter.",
          example: "Setting up a Test & Learn analysis."
        };
      }

      return {
        approach: "Guided software walkthrough",
        description: "A lightweight guided walkthrough with practice and validation for completing a system task.",
        bestFor: "Straightforward system tasks where learners need to follow steps correctly.",
        example: "Running a standard report or completing a simple setup process."
      };
    }

    if (need === "perform") {
      return {
        approach: "Job-aid-led performance support",
        description: "A practical support experience built around checklists, quick references, screenshots, or deep links to help users complete tasks during work.",
        bestFor: "Tasks learners need to complete in the flow of work without memorizing every step.",
        example: "Quick reference for where to find a specific tool or report."
      };
    }

    if (need === "understand") {
      return {
        approach: "System overview course",
        description: "A structured overview that explains what the system does, how key components fit together, and when users should use it.",
        bestFor: "System orientation before users begin hands-on practice.",
        example: "Overview of the Test & Learn platform and analysis workflow."
      };
    }
  }

  if (topicType === "decision") {
    if (need === "decide") {
      if (complexity === "complex") {
        return {
          approach: "Branching scenario course",
          description: "A decision-based course where learners evaluate realistic situations, make choices, and see consequences or feedback.",
          bestFor: "Advisory judgment, recommendation-making, and trade-off evaluation.",
          example: "Choosing the right control strategy for a Test & Learn analysis."
        };
      }

      return {
        approach: "Case-based learning",
        description: "A lighter scenario or case experience that helps learners apply judgment to realistic examples.",
        bestFor: "Moderate decision-making where learners need practice but not full branching.",
        example: "Selecting between two analysis approaches based on client needs."
      };
    }

    if (need === "understand") {
      return {
        approach: "Framework-led course",
        description: "A structured course that teaches the decision framework before learners apply it.",
        bestFor: "Topics where learners first need to understand the criteria behind good decisions.",
        example: "Understanding how to interpret Test & Learn outputs."
      };
    }
  }

  return {
    approach: "Standard structured learning",
    description: "A general structured learning experience aligned to the selected learning need, timing, and complexity.",
    bestFor: "Topics that do not clearly fit concept, system, or decision patterns.",
    example: "General learning need."
  };
}

function getAlternativeDeliveryApproaches() {
  if (topicType === "concept") {
    if (need === "understand") {
      return [
        {
          approach: "AI avatar-led course",
          whenToUse: "Use when the content is explanation-heavy, needs to be produced quickly, or benefits from a consistent presenter voice."
        },
        {
          approach: "Traditional interactive course",
          whenToUse: "Use when learners need more interaction, knowledge checks, reflection prompts, or guided engagement."
        },
        {
          approach: "Microlearning series",
          whenToUse: "Use when the topic can be broken into short, focused modules or released over time."
        }
      ];
    }

    if (need === "decide") {
      return [
        {
          approach: "Case-based discussion course",
          whenToUse: "Use when learners need to compare examples, discuss implications, or evaluate options."
        },
        {
          approach: "Interactive scenario course",
          whenToUse: "Use when learners need to practice trade-off thinking in realistic situations."
        }
      ];
    }
  }

  if (topicType === "system") {
    if (need === "execute") {
      return [
        {
          approach: "Short video + job aid",
          whenToUse: "Use when the workflow is straightforward and learners mainly need a quick reminder."
        },
        {
          approach: "Guided click-through simulation",
          whenToUse: "Use when learners need to practice the workflow safely before doing it in the live system."
        },
        {
          approach: "In-tool support / deep links",
          whenToUse: "Use when learners may get stuck during real work and need immediate help at the point of need."
        }
      ];
    }

    if (need === "perform") {
      return [
        {
          approach: "Checklist or quick reference",
          whenToUse: "Use when learners need fast task support without completing a full course."
        },
        {
          approach: "Annotated screenshot guide",
          whenToUse: "Use when visual cues help users locate screens, buttons, or fields."
        }
      ];
    }
  }

  if (topicType === "decision") {
    if (need === "decide") {
      return [
        {
          approach: "Branching scenario",
          whenToUse: "Use when choices lead to different consequences and learners need to practice judgment."
        },
        {
          approach: "Decision framework guide",
          whenToUse: "Use when learners need a reusable model or checklist to apply outside the course."
        },
        {
          approach: "Facilitated case debrief",
          whenToUse: "Use when alignment, discussion, or calibration across learners is important."
        }
      ];
    }

    if (need === "understand") {
      return [
        {
          approach: "Framework-led explainer",
          whenToUse: "Use when learners first need to understand the logic behind a decision before practicing it."
        },
        {
          approach: "Example-based course",
          whenToUse: "Use when learners benefit from seeing multiple examples before applying the framework."
        }
      ];
    }
  }

  return [
    {
      approach: "Traditional interactive course",
      whenToUse: "Use when the topic needs structured explanation, examples, and learner engagement."
    },
    {
      approach: "Video-led course",
      whenToUse: "Use when the topic benefits from narration, visuals, or a more polished storytelling approach."
    }
  ];
}

function getDeliveryRationale() {
  const delivery = getRecommendedDeliveryApproach();

  // Concept-based learning
  if (topicType === "concept" && need === "understand") {
    if (complexity === "simple") {
      return "Because this is a straightforward concept, a concise explainer format provides clarity without unnecessary depth.";
    }
    if (complexity === "moderate") {
      return "Because learners must connect multiple concepts, a video-led structured format helps build understanding while maintaining engagement.";
    }
    return "Because this topic requires interpretation and application of concepts, a more interactive format supports deeper thinking.";
  }

  // System workflows
  if (topicType === "system" && need === "execute") {
    if (complexity === "complex") {
      return "Because this task requires precision and multi-step execution, a Show / Teach / Try format enables safe practice before real-world application.";
    }
    return "Because the process is structured but straightforward, a guided walkthrough provides sufficient support for task completion.";
  }

  if (topicType === "system" && need === "perform") {
    return "Because this is a task performed in the flow of work, a performance support approach prioritizes speed and accuracy over formal instruction.";
  }

  // Decision-making
  if (topicType === "decision" && need === "decide") {
    if (complexity === "complex") {
      return "Because learners must evaluate trade-offs and make judgments, a scenario-based approach provides realistic decision practice.";
    }
    return "Because learners need exposure to applied judgment, case-based examples support evaluation without full simulation.";
  }

  if (topicType === "decision" && need === "understand") {
    return "Because learners must first understand the framework behind decisions, a structured explanation builds the foundation for later application.";
  }

  // Default fallback
  return "This approach aligns with the selected learning need, timing, and complexity to ensure effective skill or knowledge development.";
}


  
  
  return (
    <div>
      <h1>CTE Learning Format Advisor</h1>

<div className="card">
  <div>Topic</div>
  <input 
    value={topic} 
    onChange={e => setTopic(e.target.value)} 
    placeholder="Enter learning topic"
  />

<div style={{marginTop:10}}>Topic Type</div>

<select value={topicType} onChange={e => setTopicType(e.target.value)}>
  <option value="concept">Concept / Trend</option>
  <option value="system">System / Software Workflow</option>
  <option value="decision">Decision / Advisory Judgment</option>
</select>

<div style={{marginTop:6, fontSize:12, color:"#555"}}>
  {getTopicTypeDefinition()}
</div>

<div style={{marginTop:4, fontSize:11, color:"#777", fontStyle:"italic"}}>
  {getTopicTypeHint()}
</div>
  
  <div style={{marginTop:10}}>Learning Need</div>
  <select value={need} onChange={e => setNeed(e.target.value)}>
    <option value="understand">Understand</option>
    <option value="perform">Perform</option>
    <option value="decide">Decide</option>
    <option value="execute">Execute</option>
  </select>

  <div style={{marginTop:6, fontSize:12, color:"#555"}}>
    {getNeedDefinition()}
  </div>   
  <div style={{marginTop:4, fontSize:11, color:"#777", fontStyle:"italic"}}>
  {getLearningNeedHint()}
</div>
        <div style={{marginTop:10}}>Timing</div>
        <select value={timing} onChange={e => setTiming(e.target.value)}>
          <option value="before">Before Work</option>
          <option value="during">During Work</option>
          <option value="after">After Learning</option>
        </select>
<div style={{marginTop:6, fontSize:12, color:"#555"}}>
  {getTimingDefinition()}
</div>

<div style={{marginTop:4, fontSize:11, color:"#777", fontStyle:"italic"}}>
  {getTimingHint()}
</div>
<div style={{marginTop:6, fontSize:11, color:"#666"}}>
  <strong>Definition:</strong> {getWorkDefinition()}
</div>  
        <div style={{marginTop:10}}>Complexity</div>
        <select value={complexity} onChange={e => setComplexity(e.target.value)}>
          <option value="simple">Simple</option>
          <option value="moderate">Moderate</option>
          <option value="complex">Complex</option>
        </select>
<div style={{marginTop:6, fontSize:12, color:"#555"}}>
  {getComplexityDefinition()}
</div>

<div style={{marginTop:4, fontSize:11, color:"#777", fontStyle:"italic"}}>
  {getComplexityHint()}
</div>

  
</div>


      
<div className="card">
<h3>Recommendation</h3>
<div>{getRecommendation()}</div>

{getRecommendationDefinition() && (
  <div style={{marginTop:6, fontSize:12, color:"#555"}}>
    {getRecommendationDefinition()}
  </div>
)}


<div style={{
  marginTop:15,
  padding:12,
  border:"1px solid #ddd",
  borderRadius:8,
  background:"#f9fafb"
}}>
  <strong>Recommended Delivery Approach:</strong>

  <div style={{marginTop:6, fontSize:14}}>
    {getRecommendedDeliveryApproach().approach}
  </div>

  <div style={{marginTop:6, fontSize:12, color:"#555"}}>
    {getRecommendedDeliveryApproach().description}
  </div>

  {/* ✅ NEW: rationale */}
  <div style={{
    marginTop:8,
    fontSize:12,
    color:"#333",
    fontStyle:"italic"
  }}>
    {getDeliveryRationale()}
  </div>

  <div style={{marginTop:8, fontSize:12, color:"#555"}}>
    <strong>Best for:</strong> {getRecommendedDeliveryApproach().bestFor}
  </div>

  <div style={{marginTop:4, fontSize:12, color:"#555"}}>
    <strong>Example:</strong> {getRecommendedDeliveryApproach().example}
  </div>


<div style={{
  marginTop:15,
  padding:12,
  border:"1px solid #ddd",
  borderRadius:8,
  background:"#fff"
}}>
  <strong>Alternative Delivery Approaches:</strong>

  <div style={{marginTop:8}}>
    {getAlternativeDeliveryApproaches().map((item, index) => (
      <div 
        key={index}
        style={{
          marginTop:10,
          padding:10,
          border:"1px solid #eee",
          borderRadius:8,
          background:"#fafafa"
        }}
      >
        <div style={{fontSize:13}}>
          <strong>{item.approach}</strong>
        </div>

        <div style={{marginTop:4, fontSize:12, color:"#555"}}>
          {item.whenToUse}
        </div>
      </div>
    ))}
  </div>
</div>
</div>
  
<div style={{marginTop:10, fontSize:13, color:"#444"}}>
  <strong>Instructional Pattern:</strong><br/>
  {getInstructionalPattern()}
</div>
<div style={{marginTop:10, fontSize:11, color:"#777"}}>
  Required assets are essential to achieve the learning outcome. Recommended assets improve effectiveness and learner success. Optional assets are context-dependent and add incremental value.
</div>

<div style={{marginTop:15}}>
  <strong>Recommended Package:</strong>

  <div style={{marginTop:8}}>
    {getRecommendedPackage().map((item, index) => (
      <div 
        key={index} 
        style={{
          marginTop:10,
          padding:10,
          border:"1px solid #ddd",
          borderRadius:8,
          background:"#fafafa"
        }}
      >
        <div>
          <strong>{item.role}:</strong> {item.asset}
          <span style={getStatusStyle(item.status)}>
            {item.status}
          </span>
        </div>

        <div style={{marginTop:5, fontSize:12, color:"#555"}}>
          {item.definition}
        </div>
      </div>
    ))}
  </div>
</div>




  
  <div style={{marginTop:10, fontWeight:"bold"}}>
    {getConfidence()}
  </div>

  <h3 style={{marginTop:20}}>Asset Count</h3>
  <div>{getAssetCount()}</div>

  <div>
    <button onClick={copyExecutive}>
      For leadership
    </button>

    <button onClick={copyDesignBrief} style={{marginLeft:10}}>
      For design team
    </button>
  </div>
</div>

</div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LearningFormatAdvisor />);

</script>
</body>
</html>
